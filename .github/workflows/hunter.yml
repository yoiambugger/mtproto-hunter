name: Update Verified Proxy Lists

on:
  schedule:
    - cron: '0 * * * *'  # каждый час
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    # Устанавливаем зависимости прямо здесь
    - run: pip install requests telethon

    # Запускаем НАШ скрипт и берем топ-200 самых быстрых
    - run: python parser.py --top 200

    # Копируем свежие файлы в корень репозитория для удобных ссылок
    - run: |
        cp verified/proxy_ru_verified.txt  proxy_ru.txt
        cp verified/proxy_eu_verified.txt  proxy_eu.txt
        cp verified/proxy_all_verified.txt proxy_all.txt

    # Коммитим и пушим (только если есть изменения)
    - run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add verified/ proxy_ru.txt proxy_eu.txt proxy_all.txt || true
        git diff --staged --quiet || git commit -m "🔥 Verified proxies $(date)"
        git push || true

